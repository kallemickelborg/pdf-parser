name: Build Windows Executable

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend build into backend/static
        shell: pwsh
        run: |
          if (Test-Path backend/static) { Remove-Item -Recurse -Force backend/static }
          New-Item -ItemType Directory -Force -Path backend/static | Out-Null
          xcopy /E /I /Y frontend\dist backend\static

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --extra dev

      - name: Build executable
        working-directory: backend
        run: uv run pyinstaller pyinstaller/pdf-parser.spec --distpath dist --workpath build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-parser-windows
          path: backend/dist/pdf-parser.exe

      - name: Attach executable to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: backend/dist/pdf-parser.exe
